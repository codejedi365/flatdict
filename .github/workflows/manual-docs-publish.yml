name: Publish Docs (Manual)

on:
  # Enable execution directly from Actions page
  workflow_dispatch:


# default token permissions = none
permissions: {}

env:
  COMMON_PYTHON_VERSION: '3.11'

jobs:

  build-docs:
    name: Build Docs
    runs-on: ubuntu-latest

    steps:
      - name: Setup | Checkout Repository at workflow sha
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8  # v6.0.1
        with:
          ref: ${{ github.sha }}
          fetch-depth: 0

      - name: Setup | Force correct release branch on workflow sha
        run: |
          git checkout -B ${{ github.ref_name }}

      - name: Setup | Install Python ${{ env.COMMON_PYTHON_VERSION }}
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548  # v6.1.0
        with:
          python-version: ${{ env.COMMON_PYTHON_VERSION }}
          cache: 'pip'

      - name: Setup | Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install -e .[build]

      - name: Build | Build next version artifacts
        id: version
        uses: python-semantic-release/python-semantic-release@350c48fcb3ffcdfd2e0a235206bc2ecea6b69df0  # v10.5.3
        with:
          github_token: ""
          verbosity: 1
          build: true
          changelog: true
          commit: false
          push: false
          tag: false
          vcs_release: false

      - name: Test | Fail if new release detected
        if: steps.version.outputs.released == 'true'
        run: |
          printf >&2 '%s\n' "::error::Docs should not be independently published for a new release."
          exit 1

      - name: Build | Build documentation
        id: build-docs
        run: bash ./scripts/build_docs.sh

      - name: Upload | Documentation
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b  # v4.0.0
        with:
          path: ${{ steps.build-docs.outputs.DIST_DOCS_DIR }}
          retention-days: 1


  publish-docs:
    name: Publish Docs
    needs: build-docs
    runs-on: ubuntu-latest

    concurrency:
      group: github-pages
      cancel-in-progress: false

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Setup | Configure Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b  # v5

      - name: Deploy | GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e  # v4.0.5
